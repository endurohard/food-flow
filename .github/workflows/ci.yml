name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - restaurant-service
          - order-service
          - delivery-service
          - kitchen-service
          - inventory-service
          - hr-service
          - crm-service
          - finance-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: cd services/${{ matrix.service }} && npm ci
      - run: cd services/${{ matrix.service }} && npx tsc --noEmit

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        service:
          - user-service
          - restaurant-service
          - order-service
          - delivery-service
          - kitchen-service
          - inventory-service
          - hr-service
          - crm-service
          - finance-service
    steps:
      - uses: actions/checkout@v4
      - run: docker build services/${{ matrix.service }}

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - restaurant-service
          - order-service
          - delivery-service
          - kitchen-service
          - inventory-service
          - hr-service
          - crm-service
          - finance-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd services/${{ matrix.service }} && npm ci
      - run: cd services/${{ matrix.service }} && npm audit --audit-level=critical || true
