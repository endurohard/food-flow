<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - FoodFlow</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .login-subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5a6c7d;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: #2c3e50;
            background: #f8f9fa;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: #1e88e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
        }

        .form-input::placeholder {
            color: #b0bec5;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1e88e5;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #1565c0;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: #fdecea;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .tabs {
            display: flex;
            margin-bottom: 24px;
            background: #f5f7fa;
            border-radius: 10px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            border: none;
            background: none;
            font-family: inherit;
        }

        .tab.active {
            background: #ffffff;
            color: #2c3e50;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .register-fields {
            display: none;
        }

        .register-fields.visible {
            display: block;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🍽️</div>
                <div class="login-title">FoodFlow</div>
                <div class="login-subtitle">Система управления рестораном</div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="authForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="admin@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="Введите пароль" required autocomplete="current-password" minlength="6">
                </div>

                <div class="register-fields" id="registerFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-input" id="firstName" placeholder="Иван">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Фамилия</label>
                            <input type="text" class="form-input" id="lastName" placeholder="Иванов">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Телефон</label>
                        <input type="tel" class="form-input" id="phone" placeholder="+7 (999) 123-45-67">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">Войти</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : '';

        let currentTab = 'login';

        // Check if already logged in
        const existingToken = localStorage.getItem('accessToken');
        if (existingToken) {
            // Verify token is still valid
            fetch(`${API_BASE_URL}/api/users/profile`, {
                headers: { 'Authorization': `Bearer ${existingToken}` }
            }).then(res => {
                if (res.ok) {
                    window.location.href = '/admin-panel/orders.html';
                } else {
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('refreshToken');
                    localStorage.removeItem('user');
                }
            }).catch(() => {});
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;

                const registerFields = document.getElementById('registerFields');
                const submitBtn = document.getElementById('submitBtn');

                if (currentTab === 'register') {
                    registerFields.classList.add('visible');
                    submitBtn.textContent = 'Зарегистрироваться';
                    document.getElementById('firstName').required = true;
                    document.getElementById('lastName').required = true;
                } else {
                    registerFields.classList.remove('visible');
                    submitBtn.textContent = 'Войти';
                    document.getElementById('firstName').required = false;
                    document.getElementById('lastName').required = false;
                }

                hideError();
            });
        });

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('visible');
        }

        async function handleSubmit(e) {
            e.preventDefault();
            hideError();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            try {
                if (currentTab === 'login') {
                    await doLogin();
                } else {
                    await doRegister();
                }
            } catch (err) {
                showError(err.message || 'Произошла ошибка');
            } finally {
                submitBtn.disabled = false;
            }
        }

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || 'Неверный email или пароль');
            }

            saveAuth(data);
            window.location.href = '/admin-panel/orders.html';
        }

        async function doRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const phone = document.getElementById('phone').value;

            const res = await fetch(`${API_BASE_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, firstName, lastName, phone: phone || undefined })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || 'Ошибка регистрации');
            }

            saveAuth(data);
            window.location.href = '/admin-panel/orders.html';
        }

        function saveAuth(data) {
            localStorage.setItem('accessToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            localStorage.setItem('user', JSON.stringify(data.user));
        }
    </script>
</body>
</html>
