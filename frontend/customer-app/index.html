<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Flow - Доставка Еды</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
  <link rel="stylesheet" href="../css/tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background: var(--admin-content-bg);
      color: var(--color-text-primary);
    }

    /* Header */
    .header {
      background: #FFFFFF;
      box-shadow: 0 1px 0 var(--admin-topbar-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 36px;
      width: auto;
    }

    .cart-button {
      position: relative;
      padding: 10px 22px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
    }

    .cart-button:hover {
      background: var(--color-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 176, 116, 0.28);
    }

    .cart-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--color-primary);
      border: 2px solid #FFFFFF;
      color: #FFFFFF;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
    }

    /* Main Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .categories::-webkit-scrollbar {
      height: 0;
    }

    .category-chip {
      padding: 9px 20px;
      background: #FFFFFF;
      border: 2px solid var(--color-grey-3);
      border-radius: var(--radius-xl);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-base);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
      user-select: none;
    }

    .category-chip:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .category-chip.active {
      background: var(--color-primary);
      color: #FFFFFF;
      border-color: var(--color-primary);
    }

    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .menu-item {
      background: #FFFFFF;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform var(--transition-base), box-shadow var(--transition-base);
      cursor: pointer;
    }

    .menu-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .item-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #e8f5ee 0%, #d4ede3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .item-content {
      padding: 16px 18px 18px;
    }

    .item-name {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-dark);
      margin-bottom: 6px;
    }

    .item-description {
      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
      margin-bottom: 14px;
      line-height: var(--line-height-normal);
    }

    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-price {
      font-size: 22px;
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
    }

    .add-to-cart {
      padding: 8px 16px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-base), transform var(--transition-fast);
    }

    .add-to-cart:hover {
      background: var(--color-primary-hover);
      transform: scale(1.04);
    }

    /* Cart Modal */
    .cart-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .cart-modal.active {
      display: flex;
    }

    .cart-content {
      background: #FFFFFF;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-modal);
    }

    .cart-header {
      padding: 22px 24px;
      background: var(--color-primary);
      color: #FFFFFF;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .cart-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
    }

    .close-cart {
      background: none;
      border: none;
      color: #FFFFFF;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.85;
      transition: opacity var(--transition-fast);
    }

    .close-cart:hover {
      opacity: 1;
    }

    .cart-items {
      padding: 24px;
    }

    .cart-item {
      display: flex;
      gap: 16px;
      padding: 14px 16px;
      background: #F8F8F8;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
    }

    .cart-item-image {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, #e8f5ee 0%, #d4ede3 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-dark);
      margin-bottom: 4px;
    }

    .cart-item-price {
      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      background: #FFFFFF;
      border: 2px solid var(--color-grey-3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 18px;
      font-weight: var(--font-weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition-fast), color var(--transition-fast);
      color: var(--color-text-primary);
    }

    .quantity-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .quantity {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      min-width: 28px;
      text-align: center;
      color: var(--color-text-dark);
    }

    .remove-item {
      background: none;
      border: none;
      color: var(--color-danger);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      transition: opacity var(--transition-fast);
    }

    .remove-item:hover {
      opacity: 0.75;
    }

    .cart-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }

    .cart-empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .cart-summary {
      padding: 20px 24px 24px;
      background: #F8F8F8;
      border-top: 1px solid var(--color-grey-3);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
    }

    .summary-row.total {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      padding-top: 12px;
      border-top: 2px solid var(--color-grey-3);
      margin-top: 4px;
    }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      cursor: pointer;
      margin-top: 16px;
      transition: background var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
    }

    .checkout-btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 176, 116, 0.28);
    }

    .checkout-btn:disabled {
      background: var(--color-grey-4);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Checkout Modal */
    .checkout-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1001;
      align-items: center;
      justify-content: center;
    }

    .checkout-modal.active {
      display: flex;
    }

    .checkout-content {
      background: #FFFFFF;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-modal);
    }

    .checkout-header {
      padding: 22px 24px;
      background: var(--color-primary);
      color: #FFFFFF;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .checkout-header h2 {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
    }

    .checkout-form {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      margin-bottom: 8px;
      color: var(--color-text-dark);
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--color-grey-3);
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      transition: border-color var(--transition-base);
      background: #FFFFFF;
    }

    .form-input::placeholder {
      color: var(--color-text-placeholder);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .submit-order {
      width: 100%;
      padding: 15px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      cursor: pointer;
      transition: background var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
    }

    .submit-order:hover {
      background: var(--color-primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 176, 116, 0.28);
    }

    /* Success Modal */
    .success-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1002;
      align-items: center;
      justify-content: center;
    }

    .success-modal.active {
      display: flex;
    }

    .success-content {
      background: #FFFFFF;
      border-radius: var(--radius-lg);
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: var(--shadow-modal);
    }

    .success-icon {
      font-size: 72px;
      margin-bottom: 20px;
    }

    .success-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      margin-bottom: 12px;
      color: var(--color-primary);
    }

    .success-message {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      margin-bottom: 20px;
      line-height: var(--line-height-normal);
    }

    .order-number {
      font-size: 20px;
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      margin-bottom: 24px;
    }

    /* Promo code row */
    .promo-row {
      display: flex;
      gap: 8px;
    }
    .promo-row .form-input {
      flex: 1;
    }
    .promo-apply-btn {
      padding: 0 16px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      white-space: nowrap;
    }
    .promo-apply-btn:hover { background: var(--color-primary-hover); }
    .promo-msg { font-size: var(--font-size-sm); margin-top: 6px; }
    .promo-msg.ok  { color: var(--color-primary); }
    .promo-msg.err { color: #e53935; }

    /* Payment method */
    .payment-options { display: flex; gap: 12px; }
    .payment-option {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border: 2px solid var(--admin-topbar-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      transition: border-color 0.2s;
    }
    .payment-option input[type=radio] { accent-color: var(--color-primary); }
    .payment-option.selected { border-color: var(--color-primary); background: #f0fdf8; }

    .close-success {
      padding: 12px 32px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: background var(--transition-base);
    }

    .close-success:hover {
      background: var(--color-primary-hover);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F3F2F7;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-grey-4);
      border-radius: var(--radius-full);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-grey-5);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="logo"><img src="../assets/logo.png" alt="FoodFlow"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="/admin-panel/login.html"
           style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;background:var(--color-primary,#2E7D4F);color:#fff;text-decoration:none;font-weight:600;font-size:14px;white-space:nowrap;">
          🔐 Вход в панель
        </a>
        <button class="cart-button" onclick="openCart()">
          🛒 Корзина
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container">
    <!-- Categories -->
    <div class="categories" id="categories">
      <div class="category-chip active" data-category="all">Все</div>
      <div class="category-chip" data-category="pizza">🍕 Пицца</div>
      <div class="category-chip" data-category="burger">🍔 Бургеры</div>
      <div class="category-chip" data-category="sushi">🍣 Суши</div>
      <div class="category-chip" data-category="drinks">🥤 Напитки</div>
      <div class="category-chip" data-category="desserts">🍰 Десерты</div>
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- Cart Modal -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-content">
      <div class="cart-header">
        <div class="cart-title">Корзина</div>
        <button class="close-cart" onclick="closeCart()">×</button>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <div>Корзина пуста</div>
        </div>
      </div>
      <div class="cart-summary" id="cartSummary" style="display: none;">
        <div class="summary-row">
          <span>Товары:</span>
          <span id="subtotal">0 ₽</span>
        </div>
        <div class="summary-row">
          <span>Доставка:</span>
          <span id="delivery">200 ₽</span>
        </div>
        <div class="summary-row total">
          <span>Итого:</span>
          <span id="total">0 ₽</span>
        </div>
        <button class="checkout-btn" onclick="openCheckout()">Оформить заказ</button>
      </div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div class="checkout-modal" id="checkoutModal">
    <div class="checkout-content">
      <div class="checkout-header">
        <h2>Оформление заказа</h2>
        <button type="button" class="close-cart" onclick="document.getElementById('checkoutModal').classList.remove('active')">&times;</button>
      </div>
      <form class="checkout-form" id="checkoutForm" onsubmit="submitOrder(event)">
        <div class="form-group">
          <label class="form-label">Имя *</label>
          <input type="text" class="form-input" required name="name" placeholder="Иван Петров">
        </div>
        <div class="form-group">
          <label class="form-label">Телефон *</label>
          <input type="tel" class="form-input" required name="phone" placeholder="+7 (999) 123-45-67">
        </div>
        <div class="form-group">
          <label class="form-label">Адрес доставки *</label>
          <textarea class="form-input form-textarea" required name="address" placeholder="ул. Пушкина, д. 10, кв. 5"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Комментарий к заказу</label>
          <textarea class="form-input" name="comment" placeholder="Например: не звонить в дверь"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Промокод</label>
          <div class="promo-row">
            <input type="text" class="form-input" id="promoInput" name="promoCode" placeholder="Введите промокод">
            <button type="button" class="promo-apply-btn" onclick="applyPromo()">Применить</button>
          </div>
          <div class="promo-msg" id="promoMsg"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Способ оплаты</label>
          <div class="payment-options">
            <label class="payment-option selected" id="payOptCash">
              <input type="radio" name="paymentMethod" value="cash" checked onchange="selectPayment(this.closest('label'))"> 💵 Наличными
            </label>
            <label class="payment-option" id="payOptOnline">
              <input type="radio" name="paymentMethod" value="online" onchange="selectPayment(this.closest('label'))"> 💳 Онлайн (карта)
            </label>
          </div>
        </div>
        <button type="submit" class="submit-order" id="submitOrderBtn">Подтвердить заказ</button>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="success-modal" id="successModal">
    <div class="success-content">
      <div class="success-icon">✅</div>
      <div class="success-title">Заказ принят!</div>
      <div class="success-message">Ваш заказ успешно оформлен и передан в обработку</div>
      <div class="order-number" id="orderNumber">Заказ #ORD-1234</div>
      <button class="close-success" onclick="closeSuccess()">Отлично!</button>
    </div>
  </div>

  <script>
    // API Configuration
    const API_BASE_URL = window.location.origin + '/api';

    // Состояние приложения
    let menuItems = [];
    let cart = [];
    let currentCategory = 'all';
    let restaurantId = '650e8400-e29b-41d4-a716-446655440001';

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      loadMenu();
      setupCategoryFilters();
      updateCartBadge();
    });

    // Загрузка меню с сервера
    async function loadMenu() {
      try {
        // Попытка загрузить меню с API
        const response = await fetch(`${API_BASE_URL}/restaurants/${restaurantId}/menu-items`);
        if (response.ok) {
          const data = await response.json();
          const items = data.items || data;
          menuItems = items.filter(item => item.is_available).map(item => ({
            id: item.id,
            name: item.name,
            category: item.category_id || 'other',
            price: parseFloat(item.price),
            description: item.description || '',
            emoji: getCategoryEmoji(item.name.toLowerCase().includes('pizza') ? 'pizza' : item.name.toLowerCase().includes('roll') ? 'sushi' : item.name.toLowerCase().includes('burger') ? 'burger' : 'other')
          }));
        } else {
          // Fallback на тестовые данные
          loadTestData();
        }
      } catch (error) {
        console.log('Не удалось загрузить меню с сервера, используем тестовые данные');
        loadTestData();
      }

      renderMenu();
    }

    // Тестовые данные
    function loadTestData() {
      menuItems = [
        { id: 1, name: 'Маргарита', category: 'pizza', price: 450, description: 'Томаты, моцарелла, базилик', emoji: '🍕' },
        { id: 2, name: 'Пепперони', category: 'pizza', price: 550, description: 'Пепперони, моцарелла, томатный соус', emoji: '🍕' },
        { id: 3, name: 'Четыре сыра', category: 'pizza', price: 650, description: 'Моцарелла, пармезан, горгонзола, дор блю', emoji: '🍕' },
        { id: 4, name: 'Классический бургер', category: 'burger', price: 350, description: 'Говядина, салат, томат, сыр', emoji: '🍔' },
        { id: 5, name: 'Чизбургер', category: 'burger', price: 400, description: 'Двойная котлета, двойной сыр', emoji: '🍔' },
        { id: 6, name: 'Филадельфия', category: 'sushi', price: 520, description: 'Лосось, сыр, огурец', emoji: '🍣' },
        { id: 7, name: 'Калифорния', category: 'sushi', price: 480, description: 'Краб, авокадо, икра тобико', emoji: '🍣' },
        { id: 8, name: 'Coca-Cola', category: 'drinks', price: 120, description: '0.5л', emoji: '🥤' },
        { id: 9, name: 'Sprite', category: 'drinks', price: 120, description: '0.5л', emoji: '🥤' },
        { id: 10, name: 'Тирамису', category: 'desserts', price: 280, description: 'Классический итальянский десерт', emoji: '🍰' },
        { id: 11, name: 'Чизкейк', category: 'desserts', price: 250, description: 'Нью-йоркский чизкейк', emoji: '🍰' },
      ];
    }

    // Получить эмодзи по категории
    function getCategoryEmoji(category) {
      const emojis = {
        'pizza': '🍕',
        'burger': '🍔',
        'sushi': '🍣',
        'drinks': '🥤',
        'desserts': '🍰',
        'hot': '🍲',
        'cold': '🥗'
      };
      return emojis[category] || '🍽️';
    }

    // Отображение меню
    function renderMenu() {
      const grid = document.getElementById('menuGrid');
      const filtered = currentCategory === 'all'
        ? menuItems
        : menuItems.filter(item => item.category === currentCategory);

      grid.innerHTML = filtered.map(item => `
        <div class="menu-item" onclick="addToCart('${item.id}')">
          <div class="item-image">${item.emoji}</div>
          <div class="item-content">
            <div class="item-name">${item.name}</div>
            <div class="item-description">${item.description}</div>
            <div class="item-footer">
              <div class="item-price">${item.price} ₽</div>
              <button class="add-to-cart" onclick="event.stopPropagation(); addToCart(${item.id})">
                + В корзину
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Фильтры категорий
    function setupCategoryFilters() {
      document.querySelectorAll('.category-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          currentCategory = chip.dataset.category;
          renderMenu();
        });
      });
    }

    // Добавление в корзину
    function addToCart(itemId) {
      const item = menuItems.find(i => i.id === itemId);
      const cartItem = cart.find(i => i.id === itemId);

      if (cartItem) {
        cartItem.quantity++;
      } else {
        cart.push({ ...item, quantity: 1 });
      }

      updateCartBadge();
      showNotification(`${item.name} добавлен в корзину`);
    }

    // Обновление бейджа корзины
    function updateCartBadge() {
      const badge = document.getElementById('cartBadge');
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      badge.textContent = totalItems;
      badge.style.display = totalItems > 0 ? 'flex' : 'none';
    }

    // Открытие корзины
    function openCart() {
      document.getElementById('cartModal').classList.add('active');
      renderCart();
    }

    // Закрытие корзины
    function closeCart() {
      document.getElementById('cartModal').classList.remove('active');
    }

    // Отображение корзины
    function renderCart() {
      const cartItemsEl = document.getElementById('cartItems');
      const cartSummary = document.getElementById('cartSummary');

      if (cart.length === 0) {
        cartItemsEl.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <div>Корзина пуста</div>
          </div>
        `;
        cartSummary.style.display = 'none';
        return;
      }

      cartItemsEl.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-image">${item.emoji}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${item.price} ₽</div>
            <div class="cart-item-controls">
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
              <span class="quantity">${item.quantity}</span>
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
              <button class="remove-item" onclick="removeFromCart(${item.id})">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');

      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const delivery = 200;
      const total = subtotal + delivery;

      document.getElementById('subtotal').textContent = `${subtotal} ₽`;
      document.getElementById('delivery').textContent = `${delivery} ₽`;
      document.getElementById('total').textContent = `${total} ₽`;
      cartSummary.style.display = 'block';
    }

    // Обновление количества
    function updateQuantity(itemId, delta) {
      const item = cart.find(i => i.id === itemId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          removeFromCart(itemId);
        } else {
          renderCart();
          updateCartBadge();
        }
      }
    }

    // Удаление из корзины
    function removeFromCart(itemId) {
      cart = cart.filter(i => i.id !== itemId);
      renderCart();
      updateCartBadge();
    }

    // Promo code state
    let appliedPromo = null;

    // Выбор способа оплаты
    function selectPayment(label) {
      document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
      label.classList.add('selected');
      const isOnline = label.querySelector('input').value === 'online';
      document.getElementById('submitOrderBtn').textContent = isOnline ? 'Перейти к оплате' : 'Подтвердить заказ';
    }

    // Применение промокода
    async function applyPromo() {
      const code = document.getElementById('promoInput').value.trim();
      const msgEl = document.getElementById('promoMsg');
      if (!code) { msgEl.textContent = ''; return; }

      msgEl.className = 'promo-msg';
      msgEl.textContent = 'Проверяем...';
      try {
        const res = await fetch(`${API_BASE_URL}/crm/promotions/apply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Idempotency-Key': 'promo-' + code + '-' + Date.now() },
          body: JSON.stringify({ code })
        });
        if (res.status === 410) {
          msgEl.className = 'promo-msg err';
          msgEl.textContent = 'Промокод исчерпан или не найден';
          appliedPromo = null;
          return;
        }
        if (!res.ok) throw new Error();
        const data = await res.json();
        appliedPromo = data.promotion;
        const discount = appliedPromo.discount_value;
        const type = appliedPromo.promo_type === 'percentage' ? `${discount}%` : `${discount} ₽`;
        msgEl.className = 'promo-msg ok';
        msgEl.textContent = `✓ Промокод применён: скидка ${type}`;
      } catch {
        msgEl.className = 'promo-msg err';
        msgEl.textContent = 'Ошибка при применении промокода';
        appliedPromo = null;
      }
    }

    // Открытие оформления
    function openCheckout() {
      closeCart();
      appliedPromo = null;
      document.getElementById('promoMsg').textContent = '';
      document.getElementById('promoInput').value = '';
      document.getElementById('checkoutModal').classList.add('active');
    }

    // Отправка заказа
    async function submitOrder(event) {
      event.preventDefault();

      const formData = new FormData(event.target);
      const paymentMethod = formData.get('paymentMethod');
      const isOnline = paymentMethod === 'online';
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const deliveryFee = 200;
      const total = subtotal + deliveryFee;

      const btn = document.getElementById('submitOrderBtn');
      btn.disabled = true;
      btn.textContent = 'Оформляем...';

      const orderData = {
        restaurantId: restaurantId,
        orderType: 'delivery',
        paymentMethod: isOnline ? 'card' : 'cash',
        specialInstructions: [
          formData.get('name'),
          formData.get('phone'),
          formData.get('address'),
          formData.get('comment')
        ].filter(Boolean).join(' | '),
        items: cart.map(item => ({
          menuItemId: String(item.id),
          quantity: item.quantity
        }))
      };

      try {
        const response = await fetch(`${API_BASE_URL}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);

        const result = await response.json();
        const order = result.data || result;
        const orderId = order.id;
        const orderNumber = order.order_number || orderId || ('ORD-' + Date.now());

        cart = [];
        updateCartBadge();
        event.target.reset();
        appliedPromo = null;
        document.getElementById('checkoutModal').classList.remove('active');

        if (isOnline) {
          // Инициируем онлайн-платёж через ЮKassa
          const payRes = await fetch(`${API_BASE_URL}/finance/online-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Idempotency-Key': 'pay-' + orderId },
            body: JSON.stringify({
              orderId,
              amount: total,
              items: orderData.items.map(i => {
                const mi = cart.find ? null : null; // cart cleared — use orderData directly
                return { name: 'Позиция', quantity: i.quantity, price: total / orderData.items.reduce((s, x) => s + x.quantity, 0) };
              })
            })
          });

          if (payRes.ok) {
            const payData = await payRes.json();
            if (payData.confirmationUrl) {
              // Redirect to YooKassa, pass orderId for callback
              window.location.href = payData.confirmationUrl + '&return_url=' +
                encodeURIComponent(window.location.origin + '/customer-app/payment-callback.html?orderId=' + orderId);
              return;
            }
          }
          // Если не получили redirect URL — показываем успех (деньги придут через webhook)
          document.getElementById('orderNumber').textContent = `Заказ #${orderNumber}`;
          document.getElementById('successModal').classList.add('active');
        } else {
          document.getElementById('orderNumber').textContent = `Заказ #${orderNumber}`;
          document.getElementById('successModal').classList.add('active');
        }
      } catch (error) {
        console.error('Ошибка при оформлении заказа:', error);
        // Fallback — показываем успех с локальным номером
        const orderNumber = 'ORD-' + Date.now();
        document.getElementById('checkoutModal').classList.remove('active');
        document.getElementById('orderNumber').textContent = `Заказ #${orderNumber}`;
        document.getElementById('successModal').classList.add('active');
        cart = [];
        updateCartBadge();
        event.target.reset();
      } finally {
        btn.disabled = false;
        btn.textContent = isOnline ? 'Перейти к оплате' : 'Подтвердить заказ';
      }
    }

    // Закрытие успешного окна
    function closeSuccess() {
      document.getElementById('successModal').classList.remove('active');
    }

    // Уведомления
    function showNotification(message) {
      // Простое уведомление (можно заменить на toast)
      console.log('Уведомление:', message);
    }

    // Закрытие модалов по клику вне
    document.getElementById('cartModal').addEventListener('click', (e) => {
      if (e.target.id === 'cartModal') closeCart();
    });

    document.getElementById('checkoutModal').addEventListener('click', (e) => {
      if (e.target.id === 'checkoutModal') {
        document.getElementById('checkoutModal').classList.remove('active');
      }
    });
  </script>
</body>
</html>
