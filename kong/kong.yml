        strip_path: false

plugins:
  # CORS: origins="*" is incompatible with credentials=true (CVE-like).
  # JWT is passed via Authorization header, not cookies, so credentials can be false.
  # To allow cookie-based auth, replace origins:"*" with an explicit whitelist.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - X-Auth-Token
      credentials: false
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 300
      hour: 5000
      policy: local
